<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SafeScan - Allergen Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-background": "#1b1c1c",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "on-secondary-fixed-variant": "#930010",
              "tertiary-container": "#694d00",
              "secondary": "#b6171e",
              "background": "#fcf9f8",
              "tertiary-fixed": "#ffdfa0",
              "surface-container-high": "#eae7e7",
              "on-secondary-container": "#fffbff",
              "on-primary": "#ffffff",
              "outline-variant": "#c0c9bb",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "inverse-on-surface": "#f3f0ef",
              "primary-fixed": "#b1f0ce",
              "on-primary-container": "#94d2b1",
              "on-tertiary-container": "#f6bc28",
              "on-surface-variant": "#41493e",
              "primary-fixed-dim": "#95d4b3",
              "surface-container-low": "#f6f3f2",
              "on-error": "#ffffff",
              "surface-container": "#f0eded",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#0e5138",
              "inverse-primary": "#95d4b3",
              "surface-container-highest": "#e5e2e1",
              "surface": "#fcf9f8",
              "surface-variant": "#e5e2e1",
              "surface-dim": "#dcd9d9",
              "secondary-fixed-dim": "#ffb3ac",
              "tertiary-fixed-dim": "#f8bd2a",
              "on-secondary-fixed": "#410003",
              "secondary-container": "#da3433",
              "primary": "#00442d",
              "on-primary-fixed": "#002114",
              "on-tertiary-fixed-variant": "#5c4300",
              "on-surface": "#1b1c1c",
              "surface-tint": "#2c694e",
              "on-tertiary-fixed": "#261a00",
              "primary-container": "#1d5c42",
              "error": "#ba1a1a",
              "outline": "#717a6d",
              "secondary-fixed": "#ffdad6",
              "inverse-surface": "#303030",
              "surface-bright": "#fcf9f8",
              "tertiary": "#4c3700"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-frame {
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4);
        }
        .gradient-primary {
            background: linear-gradient(135deg, #00442d 0%, #1d5c42 100%);
        }
    </style>
</head>
<body class="bg-background font-body text-on-background antialiased overflow-hidden">
<!-- TopAppBar Component -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full no-border tonal-shift bg-zinc-100/50 dark:bg-zinc-900/50 shadow-none">
<div class="font-['Manrope'] font-bold text-xl tracking-tight text-emerald-900 dark:text-emerald-50">SafeScan</div>
<div class="flex items-center gap-4">
<button class="text-emerald-900 dark:text-emerald-50 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="text-emerald-900 dark:text-emerald-50 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
<div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Close up portrait of a smiling user" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCiq-AN9vL11MC3yecmxsL7cwr8Izh_ONFLQ_Fzxmx-YL3LuC55qmKF4BAvgu5ys4Js-93L1FvCw_q0ifCl5lyiuXgo9xGZGPuKajHsPgbeEfrqWgMgBZEgNTeG_YJMD8Rr_b-qEhKDH2Q-IkJpAFx95hjIuz8kmBql3rp8VVkacqOHB4dnypQyC4eBa5kewV6-OcJPsAQrgyx9-HWwqy1wrNMAlitPUKrBJBSBdYFDXCybeHmIRebZV-qv6kdUlb5Srkodi50BPTg"/>
</div>
</div>
</header>
<!-- Main Content: Scanner Viewport -->
<main class="relative h-screen w-full flex flex-col items-center justify-center pt-16 pb-32">
<!-- Camera Viewfinder Background -->
<div class="absolute inset-0 z-0 bg-zinc-900">
<img alt="Grocery store shelf" class="w-full h-screen object-cover opacity-60" data-alt="Blurred grocery store aisle with food products" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCMCGuiyrb9Y2X3PdP0Xnj80rm_hNBVVoggJAJIdx2XcMEUyT4-JKkiSvXFpH0V_AMeK3JmTtTa1maCNx-s5agEVlpIkq7ZHpDk5Rt74Zhg0dcHB9DmgKpWDoj326q2BmLVq09NUvEF2i0d53VCW6YnC1kf3nX3dZzkkbIyzNSkBQ8ikvPqgzIVBVASL_AFTXIo6H1N-sxqixSK3ttt6e-QenRd1KRtpR3wYTeiuRL8N-cOJx7CJX7jT9PFHck2MBdLRNgy3xs60Ik"/>
</div>
<!-- Scanning UI Overlay -->
<div class="relative z-10 flex flex-col items-center w-full px-8 max-w-md">
<!-- Instructions -->
<div class="mb-12 text-center">
<h1 class="font-headline font-bold text-white text-2xl mb-2">Scanning Barcode</h1>
<p class="text-white/80 text-sm font-medium">Align the barcode within the frame</p>
</div>
<!-- Viewfinder Frame -->
<div class="relative w-full aspect-square max-w-[280px] rounded-3xl overflow-hidden scanner-frame border-2 border-primary-fixed/50">
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-primary-fixed rounded-tl-3xl"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-primary-fixed rounded-tr-3xl"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-primary-fixed rounded-bl-3xl"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-primary-fixed rounded-br-3xl"></div>
<!-- Scanning Line -->
<div class="absolute top-0 left-0 w-full h-0.5 bg-primary-fixed shadow-[0_0_15px_rgba(177,240,206,0.8)] opacity-60"></div>
</div>
<!-- Lighting Toggle -->
<button class="mt-8 w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 text-white flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="flashlight_on">flashlight_on</span>
</button>
</div>
<!-- Floating Scan Button -->
<div class="absolute bottom-32 left-0 w-full flex justify-center z-20 pointer-events-none">
<button class="pointer-events-auto gradient-primary text-white flex items-center gap-3 px-10 py-5 rounded-full shadow-2xl active:scale-95 transition-all group">
<span class="material-symbols-outlined text-3xl" data-icon="barcode_scanner">barcode_scanner</span>
<span class="font-headline font-bold text-lg">Scan</span>
</button>
</div>
</main>
<!-- Contextual Insight Card (Editorial Detail) -->
<div class="fixed bottom-28 left-6 right-6 z-30">
<div class="bg-surface-container-lowest/90 backdrop-blur-xl p-4 rounded-2xl flex items-center gap-4 shadow-xl border border-white/20">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-primary-fixed-variant" data-icon="shield_check">shield</span>
</div>
<div class="flex-1">
<p class="text-[11px] font-label font-medium uppercase tracking-wider text-on-surface-variant">Live Analysis</p>
<p class="font-headline font-semibold text-sm text-on-surface">Auto-detecting peanuts &amp; gluten</p>
</div>
</div>
</div>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-8 pt-4 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl z-50 rounded-t-3xl shadow-[0_-10px_30px_rgba(0,0,0,0.04)] no-border tonal-layering">
<!-- Home Tab -->
<a class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 px-5 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Home</span>
</a>
<!-- Scan Tab (Active) -->
<a class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/30 text-emerald-900 dark:text-emerald-100 rounded-2xl px-5 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="barcode_scanner" style="font-variation-settings: 'FILL' 1;">barcode_scanner</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Scan</span>
</a>
<!-- Profile Tab -->
<a class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 px-5 py-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Profile</span>
</a>
</nav>
</body></html>
