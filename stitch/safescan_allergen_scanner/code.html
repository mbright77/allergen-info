<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SafeScan Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-background": "#1b1c1c",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#93000a",
              "on-secondary-fixed-variant": "#930010",
              "tertiary-container": "#694d00",
              "secondary": "#b6171e",
              "background": "#fcf9f8",
              "tertiary-fixed": "#ffdfa0",
              "surface-container-high": "#eae7e7",
              "on-secondary-container": "#fffbff",
              "on-primary": "#ffffff",
              "outline-variant": "#c0c9bb",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "inverse-on-surface": "#f3f0ef",
              "primary-fixed": "#b1f0ce",
              "on-primary-container": "#94d2b1",
              "on-tertiary-container": "#f6bc28",
              "on-surface-variant": "#41493e",
              "primary-fixed-dim": "#95d4b3",
              "surface-container-low": "#f6f3f2",
              "on-error": "#ffffff",
              "surface-container": "#f0eded",
              "on-secondary": "#ffffff",
              "on-primary-fixed-variant": "#0e5138",
              "inverse-primary": "#95d4b3",
              "surface-container-highest": "#e5e2e1",
              "surface": "#fcf9f8",
              "surface-variant": "#e5e2e1",
              "surface-dim": "#dcd9d9",
              "secondary-fixed-dim": "#ffb3ac",
              "tertiary-fixed-dim": "#f8bd2a",
              "on-secondary-fixed": "#410003",
              "secondary-container": "#da3433",
              "primary": "#00442d",
              "on-primary-fixed": "#002114",
              "on-tertiary-fixed-variant": "#5c4300",
              "on-surface": "#1b1c1c",
              "surface-tint": "#2c694e",
              "on-tertiary-fixed": "#261a00",
              "primary-container": "#1d5c42",
              "error": "#ba1a1a",
              "outline": "#717a6d",
              "secondary-fixed": "#ffdad6",
              "inverse-surface": "#303030",
              "surface-bright": "#fcf9f8",
              "tertiary": "#4c3700"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased selection:bg-primary-fixed selection:text-on-primary-fixed-variant">
<!-- TopAppBar -->
<!-- Shell Visibility: Transactional/Onboarding suppresses the standard Nav, but TopAppBar acts as the header identity -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-xl no-border tonal-shift bg-zinc-100/50 dark:bg-zinc-900/50">
<div class="flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-2">
<span class="font-['Manrope'] font-bold text-xl tracking-tight text-emerald-900 dark:text-emerald-50">SafeScan</span>
</div>
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-zinc-500" data-icon="help_outline">help_outline</span>
</button>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-6 min-h-screen max-w-md mx-auto">
<!-- Editorial Header -->
<section class="mb-10">
<h1 class="font-headline font-extrabold text-4xl text-primary leading-tight tracking-tight mb-4">
                Define your <br/><span class="text-primary-container">Safe Zone</span>
</h1>
<p class="text-on-surface-variant font-body text-lg leading-relaxed">
                Select the allergens you need to avoid. We'll alert you instantly during your next scan.
            </p>
</section>
<!-- Allergen Grid (Asymmetric Editorial Layout) -->
<div class="grid grid-cols-2 gap-4 mb-12">
<!-- Milk -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 hover:bg-primary-fixed transition-colors group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-3 group-hover:bg-on-primary-fixed-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="water_drop">water_drop</span>
</div>
<span class="font-headline font-semibold text-on-surface">Milk</span>
</button>
<!-- Egg -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 hover:bg-primary-fixed transition-colors group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-3 group-hover:bg-on-primary-fixed-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="egg">egg</span>
</div>
<span class="font-headline font-semibold text-on-surface">Egg</span>
</button>
<!-- Gluten (Active State Example) -->
<button class="flex flex-col items-center justify-center p-6 bg-primary-container text-on-primary rounded-xl shadow-md active:scale-95 duration-200">
<div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="bakery_dining" style="font-variation-settings: 'FILL' 1;">bakery_dining</span>
</div>
<div class="flex items-center gap-1">
<span class="font-headline font-semibold">Gluten</span>
<span class="material-symbols-outlined text-sm" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Nuts -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 hover:bg-primary-fixed transition-colors group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-3 group-hover:bg-on-primary-fixed-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="eco">eco</span>
</div>
<span class="font-headline font-semibold text-on-surface">Nuts</span>
</button>
<!-- Soy -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 hover:bg-primary-fixed transition-colors group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-3 group-hover:bg-on-primary-fixed-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="grass">grass</span>
</div>
<span class="font-headline font-semibold text-on-surface">Soy</span>
</button>
<!-- Peanuts -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 hover:bg-primary-fixed transition-colors group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-3 group-hover:bg-on-primary-fixed-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="spa">spa</span>
</div>
<span class="font-headline font-semibold text-on-surface">Peanuts</span>
</button>
<!-- Fish -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 hover:bg-primary-fixed transition-colors group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-3 group-hover:bg-on-primary-fixed-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="set_meal">set_meal</span>
</div>
<span class="font-headline font-semibold text-on-surface">Fish</span>
</button>
<!-- Shellfish -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/10 hover:bg-primary-fixed transition-colors group active:scale-95 duration-200">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center mb-3 group-hover:bg-on-primary-fixed-variant/10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="rebase_edit">rebase_edit</span>
</div>
<span class="font-headline font-semibold text-on-surface">Shellfish</span>
</button>
</div>
<!-- Editorial Info Card -->
<div class="bg-surface-container-high rounded-2xl p-6 mb-8 flex items-start gap-4">
<div class="mt-1">
<span class="material-symbols-outlined text-primary" data-icon="verified_user">verified_user</span>
</div>
<div>
<h4 class="font-headline font-bold text-on-surface mb-1">Privacy First</h4>
<p class="text-sm text-on-surface-variant font-body">Your health data is stored locally on your device and never shared with third parties.</p>
</div>
</div>
</main>
<!-- Fixed Footer Action -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-white/80 backdrop-blur-xl">
<div class="max-w-md mx-auto">
<button class="w-full h-16 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold text-lg rounded-full shadow-lg hover:opacity-90 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2">
                Save &amp; Start Scanning
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
<!-- Decorative Element -->
<div class="fixed top-20 -right-20 w-64 h-64 bg-primary-fixed/30 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-20 -left-20 w-64 h-64 bg-tertiary-fixed/20 rounded-full blur-3xl -z-10"></div>
</body></html>
